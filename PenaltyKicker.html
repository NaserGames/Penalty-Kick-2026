<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Pro | World Class Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --gold: #f1c40f;
            --glass: rgba(255, 255, 255, 0.08);
            --bg: #020617;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .stadium-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(0, 255, 136, 0.15) 0%, transparent 50%), #020617;
            z-index: -1;
        }

        /* --- UI COMPONENTS --- */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hud { position: absolute; top: 30px; left: 30px; right: 30px; display: flex; justify-content: space-between; z-index: 100; align-items: center; }
        .cash-pill { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--gold); color: var(--gold); font-weight: 900; font-size: 1.2rem; }
        
        .mute-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* --- MENU --- */
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area h1 { font-size: 5.5rem; margin: 0; font-weight: 900; background: linear-gradient(#fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        
        .menu-grid { display: flex; gap: 20px; }
        .menu-card { background: var(--glass); padding: 40px; border-radius: 30px; width: 220px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); transition: 0.3s; }
        .menu-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }

        /* --- PITCH --- */
        #stadium { width: 850px; height: 400px; border-radius: 25px; position: relative; background: linear-gradient(to bottom, #1e293b, #27ae60); border: 5px solid white; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        #goal-net { width: 420px; height: 200px; border: 10px solid white; border-bottom: none; margin: 40px auto 0; position: relative; background: rgba(255,255,255,0.05); }
        #keeper { position: absolute; bottom: 0; left: 42%; font-size: 75px; transition: 0.35s ease-out; z-index: 2; }
        #ball { position: absolute; bottom: -60px; left: 46.5%; font-size: 55px; transition: 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 3; }

        /* --- SHOP GRID --- */
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-height: 60vh; overflow-y: auto; padding: 10px; }
        .shop-item { background: var(--glass); padding: 20px; border-radius: 20px; width: 150px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .shop-item:hover { border-color: var(--secondary); transform: scale(1.05); }
        .ball-preview { font-size: 3rem; margin-bottom: 10px; display: block; }

        /* --- BUTTONS --- */
        .btn { padding: 15px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-main { background: var(--primary); color: #020617; width: 100%; }
        .btn-shot { background: white; margin: 0 10px; width: 140px; font-size: 1.1rem; }
        .btn-shot:hover { background: var(--secondary); transform: scale(1.05); }

        /* --- ANIMATIONS --- */
        .dive-l { transform: translateX(-150px) rotate(-30deg); }
        .dive-r { transform: translateX(150px) rotate(30deg); }
        .kick-l { transform: translate(-160px, -300px) scale(0.5) rotate(-720deg); }
        .kick-c { transform: translate(0, -320px) scale(0.5) rotate(-720deg); }
        .kick-r { transform: translate(160px, -300px) scale(0.5) rotate(-720deg); }
    </style>
</head>
<body>

    <div class="stadium-bg"></div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="hud">
        <div class="cash-pill">💰 $<span id="cash-val">0</span></div>
        <button class="mute-btn" onclick="toggleMute()">🔊</button>
    </div>

    <div id="menu-screen" class="screen active">
        <div class="logo-area">
            <h1>ELITE KICKER</h1>
            <p style="letter-spacing: 10px; color: var(--secondary);">AFRO SOUL EDITION</p>
        </div>
        <div class="menu-grid">
            <div class="menu-card" onclick="nav('game-screen')">
                <span style="font-size:4rem">⚽</span>
                <h2>PITCH</h2>
                <p>Start Match</p>
            </div>
            <div class="menu-card" onclick="nav('shop-screen')">
                <span style="font-size:4rem">🛍️</span>
                <h2>STORE</h2>
                <p>Equip Gear</p>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="stadium">
            <div id="goal-net"><div id="keeper">🧤</div></div>
            <div id="ball">⚽</div>
        </div>
        <div style="margin-top:40px;">
            <button class="btn btn-shot" onclick="shoot('l')">LEFT</button>
            <button class="btn btn-shot" onclick="shoot('c')">CENTER</button>
            <button class="btn btn-shot" onclick="shoot('r')">RIGHT</button>
        </div>
        <button class="btn" style="background:none; color:#777; margin-top:20px;" onclick="nav('menu-screen')">BACK TO MENU</button>
    </div>

    <div id="shop-screen" class="screen">
        <h1 style="color:var(--gold); font-size: 3rem; margin-bottom: 20px;">PRO SHOP</h1>
        <div class="shop-grid">
            <div class="shop-item"><span class="ball-preview">⚽</span><button class="btn btn-main" onclick="equip('⚽')">EQUIP</button></div>
            <div class="shop-item"><span class="ball-preview">🏀</span><p>$10</p><button id="b-10" class="btn btn-main" onclick="buy(10, '🏀', 'b-10')">BUY</button></div>
            <div class="shop-item"><span class="ball-preview">🎾</span><p>$20</p><button id="b-20" class="btn btn-main" onclick="buy(20, '🎾', 'b-20')">BUY</button></div>
            <div class="shop-item"><span class="ball-preview" style="opacity:0.4">👻</span><p>$40</p><button id="b-40" class="btn btn-main" onclick="buy(40, '👻', 'b-40')">BUY</button></div>
            <div class="shop-item"><span class="ball-preview">☄️</span><p>$75</p><button id="b-75" class="btn btn-main" onclick="buy(75, '☄️', 'b-75')">BUY</button></div>
            <div class="shop-item"><span class="ball-preview" style="text-shadow: 0 0 15px cyan;">💎</span><p>$150</p><button id="b-150" class="btn btn-main" onclick="buy(150, '💎', 'b-150')">BUY</button></div>
            <div class="shop-item"><span class="ball-preview" style="filter: hue-rotate(280deg) brightness(1.5);">🌀</span><p>$250</p><button id="b-250" class="btn btn-main" onclick="buy(250, '🌀', 'b-250')">BUY</button></div>
            <div class="shop-item"><span class="ball-preview" style="text-shadow: 0 0 10px #00ff88;">🔋</span><p>$500</p><button id="b-500" class="btn btn-main" onclick="buy(500, '🔋', 'b-500')">BUY</button></div>
            <div class="shop-item"><span class="ball-preview" style="filter: drop-shadow(0 0 10px gold);">👑</span><p>$1000</p><button id="b-1000" class="btn btn-main" onclick="buy(1000, '👑', 'b-1000')">BUY</button></div>
        </div>
        <button class="btn" style="margin-top:20px; background:rgba(255,255,255,0.1); color:white;" onclick="nav('menu-screen')">BACK</button>
    </div>

    <script>
        let cash = parseInt(localStorage.getItem('p-cash')) || 0;
        let inventory = JSON.parse(localStorage.getItem('p-inv')) || ['⚽'];
        let busy = false;
        const music = document.getElementById('bg-music');
        let musicStarted = false;

        function updateUI() {
            document.getElementById('cash-val').innerText = cash;
            localStorage.setItem('p-cash', cash);
            localStorage.setItem('p-inv', JSON.stringify(inventory));
            
            inventory.forEach(item => {
                const btn = document.querySelector(`button[onclick*="'${item}'"]`);
                if(btn && item !== '⚽') {
                    btn.innerText = "EQUIP";
                    btn.style.background = "var(--secondary)";
                }
            });
        }

        function toggleMute() {
            music.muted = !music.muted;
            document.querySelector('.mute-btn').innerText = music.muted ? "🔇" : "🔊";
        }

        function nav(id) {
            if (!musicStarted) {
                music.volume = 0.3;
                music.play().catch(e => console.log("Music requires interaction"));
                musicStarted = true;
            }
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            updateUI();
        }

        function buy(price, emoji, id) {
            if (inventory.includes(emoji)) { equip(emoji); return; }
            if (cash >= price) {
                cash -= price;
                inventory.push(emoji);
                updateUI();
                equip(emoji);
            } else { alert("Go score more goals for more cash!"); }
        }

        function equip(emoji) {
            const ballEl = document.getElementById('ball');
            ballEl.innerText = emoji;
            ballEl.style.opacity = (emoji === '👻') ? "0.4" : "1";
            ballEl.style.textShadow = (emoji === '💎') ? "0 0 25px #00d4ff" : (emoji === '🔋') ? "0 0 20px #00ff88" : "none";
            ballEl.style.filter = (emoji === '🌀') ? "hue-rotate(280deg) blur(1px)" : (emoji === '👑') ? "drop-shadow(0 0 15px gold)" : "none";
            nav('menu-screen');
        }

        function shoot(aim) {
            if (busy) return;
            busy = true;

            const ball = document.getElementById('ball');
            const keeper = document.getElementById('keeper');

            keeper.style.transition = 'none'; ball.style.transition = 'none';
            keeper.className = ''; ball.className = '';
            void ball.offsetWidth; 

            keeper.style.transition = '0.35s ease-out';
            ball.style.transition = '0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            
            const cpuDive = ['l', 'c', 'r'][Math.floor(Math.random() * 3)];
            if(cpuDive !== 'c') keeper.classList.add('dive-' + cpuDive);
            ball.classList.add('kick-' + aim);

            setTimeout(() => {
                if (aim !== cpuDive) {
                    cash += 5;
                    updateUI();
                }
                setTimeout(() => {
                    ball.className = ''; keeper.className = '';
                    busy = false;
                }, 1000);
            }, 600);
        }

        updateUI();
    </script>
</body>
</html>
